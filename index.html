<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB Nubers | Plataforma Nutricional</title>
    <link rel="icon" href="IMG-20260701-WA0098.jpg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    
</head>

<body>

    <main class="login">

        <div class="login-box">

            <h1>DB Nubers</h1>

            <p>Plataforma de gestión nutricional</p>

            <p style="color:#60697E; font-size:14px;">
                Inicia sesión para acceder a tu panel
            </p>

            <form id="loginForm">

                <input type="email" id="email" placeholder="Correo electrónico" autocomplete="email" required>

                <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password" required>

                <button type="submit">
                    Iniciar sesión
                </button>

            </form>

            <span id="message"></span>

            <p style="margin-top:15px; font-size:12px; color:#9a9c9c;">
                Acceso exclusivo para profesionales y pacientes registrados
            </p>

        </div>

    </main>

    <script type="module" src="firebase.js"></script>
    <script type="module" src="script.js"></script>

</body>

</html>
